<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FormulaicNexusDelhii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <iframe 
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbz-CJRg4P6b5Et6MABpXFrXGMFOEmDblNjeeYz8LeGO9Tv-Mu7NytFMNEonzWeLMewOOA/exec"
    width="100%"
    height="100%"
    frameborder="0"
    scrolling="yes"
    allow="geolocation; microphone; camera"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
        var iframe = document.getElementById('app-frame');
        if(iframe) { iframe.focus(); }
    };
  </script>
</body>
</html>
