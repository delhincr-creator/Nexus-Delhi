<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbyPfuams5IVHMTQ-WTJmKGZTGZlUVu3V0Fl9PljxyaNlcWg9kzO4djYh-UZmSrNn1RJrQ/exec">
    <title>Redirecting to Delhi Attendance System</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .loader-container {
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p>Opening Delhi Attendance System...</p>
        <p><small>If the page does not load, <a href="https://script.google.com/macros/s/AKfycbz-CJRg4P6b5Et6MABpXFrXGMFOEmDblNjeeYz8LeGO9Tv-Mu7NytFMNEonzWeLMewOOA/exec">click here</a>.</small></p>
    </div>
</body>
</html>
